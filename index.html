<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ObjetShop</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%23fe2c55'/><text x='50%' y='54%' dominant-baseline='middle' text-anchor='middle' font-size='18' font-family='sans-serif' fill='white'>O</text></svg>">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root { --brand: #fe2c55; --dark: #0d0d0d; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', sans-serif; background: var(--dark); color: #fff; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 40px; }
    .logo { width: 72px; height: 72px; background: var(--brand); border-radius: 18px; display: flex; align-items: center; justify-content: center; font-family: 'DM Serif Display', serif; font-size: 40px; color: #fff; margin: 0 auto 24px; }
    h1 { font-family: 'DM Serif Display', serif; font-size: 3rem; margin-bottom: 12px; }
    p { color: #aaa; font-size: 1.1rem; margin-bottom: 40px; }
    .links { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; }
    a { padding: 12px 28px; border-radius: 8px; font-weight: 600; font-size: 0.95rem; text-decoration: none; transition: opacity 0.2s; }
    a:hover { opacity: 0.85; }
    .btn-primary { background: var(--brand); color: #fff; }
    .btn-secondary { background: #222; color: #fff; border: 1px solid #444; }
  </style>
</head>
<body>
  <div class="logo">O</div>
  <h1>ObjetShop</h1>
  <p>Automated short-form product video publishing</p>
  <div class="links">
    <a href="privacy.html" class="btn-primary">Privacy Policy</a>
    <a href="terms.html" class="btn-secondary">Terms of Service</a>
  </div>
</body>
</html>
